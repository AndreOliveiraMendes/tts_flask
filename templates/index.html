{% extends "base.html" %}

{% block title %}Controle Termux{% endblock %}

{% block style %}
<style>
body {
    background: linear-gradient(135deg, #1e1e2f, #2c2c54);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* glass effect */
.container {
    background: rgba(47,47,79,0.85);
    backdrop-filter: blur(10px);
    padding: 30px;
    border-radius: 16px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    width: 320px;
    text-align: center;
}

h1 { margin-bottom: 20px; }

input[type="text"] {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: none;
    margin-bottom: 15px;
}

/* sliders */
.range-group { text-align: left; margin-bottom: 15px; }
.range-header {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
}
.range-value { color: #00e5ff; }

button {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    margin-bottom: 10px;
    cursor: pointer;
}

.btn-fala { background: #4CAF50; }
.btn-vibrate { background: #2196F3; }

.footer {
    margin-top: 15px;
    font-size: 12px;
    opacity: 0.7;
}
</style>
{% endblock %}

{% block content %}
<div class="container">
    <h1>📱 Termux Control</h1>
    <div id="status"></div>

    <form onsubmit="enviarFala(event)">
        <input type="text" name="msg" placeholder="Digite algo...">

        <div class="range-group">
            <div class="range-header">
                <span>🔊 Volume</span>
                <span id="volVal" class="range-value">0.9</span>
            </div>
            <input type="range" name="volume" min="0" max="1" step="0.1" value="0.9"
                oninput="updateVal('volVal', this.value)">
        </div>

        <div class="range-group">
            <div class="range-header">
                <span>⚡ Velocidade</span>
                <span id="rateVal" class="range-value">1</span>
            </div>
            <input type="range" name="rate" min="0.5" max="2" step="0.1" value="1"
                oninput="updateVal('rateVal', this.value)">
        </div>

        <div class="range-group">
            <div class="range-header">
                <span>🎵 Pitch</span>
                <span id="pitchVal" class="range-value">1</span>
            </div>
            <input type="range" name="pitch" min="0.5" max="2" step="0.1" value="1"
                oninput="updateVal('pitchVal', this.value)">
        </div>

        <button class="btn-fala" type="submit">🔊 Falar</button>
    </form>

    <button class="btn-vibrate" onclick="vibrar()">📳 Vibrar</button>
    <button onclick="location.href='/status'">📊 Status</button>

    <div class="footer">Flask + Termux API</div>
</div>
{% endblock %}

{% block script %}
<script>
function updateVal(id, value) {
    document.getElementById(id).textContent = value;
}

async function apiFetch(url) {
    return fetch(url);
}

async function enviarFala(e) {
    e.preventDefault();

    const msg = document.querySelector('[name="msg"]').value;
    if (!msg) return alert("Digite algo");

    const volume = document.querySelector('[name="volume"]').value;
    const rate = document.querySelector('[name="rate"]').value;
    const pitch = document.querySelector('[name="pitch"]').value;

    const res = await apiFetch(`/fala?msg=${encodeURIComponent(msg)}&volume=${volume}&rate=${rate}&pitch=${pitch}`);

    if (res.status === 403) return showStatus("🔒 Não autorizado");

    const data = await res.json();
    showStatus(data.status === "ok" ? "🔊 Falando..." : "Erro");
}

async function vibrar() {
    const res = await apiFetch("/vibrate");

    if (res.status === 403) return showStatus("🔒 Não autorizado");

    const data = await res.json();
    showStatus(data.status === "ok" ? "📳 Vibrou!" : "Erro");
}

function showStatus(msg) {
    const el = document.getElementById("status");
    el.textContent = msg;
    setTimeout(() => el.textContent = "", 2000);
}
</script>
{% endblock %}
